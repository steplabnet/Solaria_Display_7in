; PlatformIO Project Configuration File
[env:WAVESHARE-ESP-LCD]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = WAVESHARE-ESP-LCD
framework = arduino

; Serial Speeds
upload_speed = 921600
monitor_speed = 115200

; Ports
;upload_port = COM22
;monitor_port = COM31

; Build settings
; --- RS485 TX TEST BRANCH ---
; Compile ONLY the minimal RS485 transmit test; exclude the full app sources
; so nothing brings up the LCD/touch stack or touches GPIO15/16.
build_src_filter = -<*> +<rs485_tx_test.cpp>
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
; --- CRITICAL OTA SETTINGS START ---
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi
; --- CRITICAL OTA SETTINGS END ---

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0    -DCORE_DEBUG_LEVEL=0
    -I src
    -I lib
    -I lib/touch
    -I lib/lvgl
    -I lib/lvgl_port
    -I lib/rgb_lcd_port
    -I lib/ch422g
    -I lib/font
    -I lib/gui_bmp
    -I lib/gui_paint
    -I lib/i2c
    -I lib/image
    -I lib/twai
    -I lib/user_sd
    -I lib/user_wifi
    -I lib/user_interface
    -DBOARD_HAS_PSRAM
    ; Define RS485 Pins for Waveshare ESP32-S3 7inch
    ; Per Waveshare's official 05_RS485 example: ESP32 RX=GPIO15, TX=GPIO16.
    ; (Docs' "TXD15/RXD16" silkscreen is the transceiver side, i.e. reversed.)
    -D RS485_TX_PIN=16
    -D RS485_RX_PIN=15

lib_deps = 
    bblanchon/ArduinoJson@7.0.4